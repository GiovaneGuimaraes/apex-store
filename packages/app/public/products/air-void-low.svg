<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)"/>

  <!-- Ghost letter -->
  <text x="180" y="330" font-family="sans-serif" font-weight="900" font-size="280" fill="#DEDBC8" opacity="0.03">V</text>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="180" x2="400" y2="200" stroke="#DEDBC8" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="190" x2="400" y2="210" stroke="#DEDBC8" stroke-width="0.3" opacity="0.04"/>

  <!-- Sneaker — low profile side view -->
  <path d="M 44,245 C 44,210 60,185 90,178 C 130,170 190,172 240,172 C 295,172 330,185 345,205 C 354,218 355,235 350,248 L 44,248 Z"
        fill="#DEDBC8" fill-opacity="0.07" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- Sole strip -->
  <rect x="38" y="248" width="318" height="12" rx="6" fill="#DEDBC8" opacity="0.14"/>
  <!-- Heel detail -->
  <rect x="38" y="210" width="18" height="38" rx="5" fill="#DEDBC8" opacity="0.07"/>
  <!-- Toe cap -->
  <ellipse cx="340" cy="228" rx="24" ry="22" fill="#DEDBC8" opacity="0.06" stroke="#DEDBC8" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Lace eyelets -->
  <g fill="#DEDBC8" opacity="0.4">
    <circle cx="150" cy="186" r="2"/>
    <circle cx="175" cy="182" r="2"/>
    <circle cx="200" cy="179" r="2"/>
    <circle cx="225" cy="178" r="2"/>
    <circle cx="250" cy="179" r="2"/>
  </g>

  <!-- APEX badge -->
  <text x="30" y="40" font-family="sans-serif" font-weight="700" font-size="10" letter-spacing="5" fill="#DEDBC8" opacity="0.6">APEX</text>

  <!-- Product name -->
  <text x="30" y="320" font-family="sans-serif" font-weight="800" font-size="26" letter-spacing="-0.5" fill="#DEDBC8" opacity="0.9">AIR VOID</text>
  <text x="30" y="348" font-family="sans-serif" font-weight="300" font-size="20" letter-spacing="2" fill="#DEDBC8" opacity="0.6">LOW</text>

  <!-- Category -->
  <text x="30" y="372" font-family="sans-serif" font-size="8" letter-spacing="3" fill="#DEDBC8" opacity="0.25">SNEAKERS · SUEDE</text>

  <!-- Corner accent -->
  <rect x="358" y="358" width="14" height="14" fill="none" stroke="#DEDBC8" stroke-width="0.5" opacity="0.2"/>
</svg>
