<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#060606"/>

  <!-- Bold geometric background element -->
  <rect x="180" y="30" width="2" height="340" fill="#DEDBC8" opacity="0.06"/>

  <!-- Ghost OG text -->
  <text x="100" y="310" font-family="sans-serif" font-weight="900" font-size="240" fill="#DEDBC8" opacity="0.04">O</text>

  <!-- High-top profile (tall) -->
  <!-- Tall ankle collar -->
  <path d="M 44,200 C 44,155 55,120 75,105 C 95,90 120,85 145,88 L 148,160 C 136,158 128,162 122,170 L 44,200 Z"
        fill="#DEDBC8" fill-opacity="0.07" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Main upper -->
  <path d="M 44,252 C 44,225 52,208 70,202 L 122,170 C 142,162 195,158 255,162 C 308,165 345,180 358,204 C 364,218 362,238 356,252 L 44,252 Z"
        fill="#DEDBC8" fill-opacity="0.09" stroke="#DEDBC8" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Chunky sole (OG silhouette) -->
  <rect x="38" y="252" width="324" height="18" rx="9" fill="#DEDBC8" opacity="0.2"/>
  <rect x="44" y="260" width="312" height="6" rx="3" fill="#000" opacity="0.3"/>

  <!-- High-top lace column -->
  <g fill="#DEDBC8" opacity="0.42">
    <circle cx="140" cy="175" r="2.2"/>
    <circle cx="140" cy="155" r="2.2"/>
    <circle cx="140" cy="135" r="2.2"/>
    <circle cx="140" cy="115" r="2.2"/>
    <circle cx="150" cy="96" r="2.2"/>
    <circle cx="170" cy="170" r="2.2"/>
    <circle cx="195" cy="165" r="2.2"/>
    <circle cx="220" cy="163" r="2.2"/>
  </g>

  <!-- APEX badge -->
  <text x="30" y="40" font-family="sans-serif" font-weight="700" font-size="10" letter-spacing="5" fill="#DEDBC8" opacity="0.6">APEX</text>
  <!-- OG star mark -->
  <text x="355" y="42" font-family="sans-serif" font-size="18" fill="#DEDBC8" opacity="0.5">✦</text>

  <!-- Product name -->
  <text x="30" y="315" font-family="sans-serif" font-weight="800" font-size="28" letter-spacing="-1" fill="#DEDBC8" opacity="0.9">APEX OG</text>
  <text x="30" y="345" font-family="sans-serif" font-weight="300" font-size="18" letter-spacing="4" fill="#DEDBC8" opacity="0.6">HIGH</text>

  <!-- Founding year -->
  <text x="30" y="368" font-family="sans-serif" font-size="8" letter-spacing="3" fill="#DEDBC8" opacity="0.25">OG SILHOUETTE · EST. 2016</text>

  <!-- Corner bracket -->
  <path d="M 370,370 L 390,370 L 390,390" fill="none" stroke="#DEDBC8" stroke-width="0.8" opacity="0.2"/>
</svg>
