<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="studio-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#020202"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#studio-bg)"/>

  <!-- Grid composition (studio / art collab) -->
  <g stroke="#DEDBC8" opacity="0.04" stroke-width="0.5">
    <line x1="133" y1="0" x2="133" y2="400"/>
    <line x1="267" y1="0" x2="267" y2="400"/>
    <line x1="0" y1="133" x2="400" y2="133"/>
    <line x1="0" y1="267" x2="400" y2="267"/>
  </g>

  <!-- Collab "×" symbol watermark -->
  <text x="145" y="265" font-family="sans-serif" font-weight="900" font-size="180" fill="#DEDBC8" opacity="0.04">×</text>

  <!-- Low silhouette (similar to Air Void but with collab distinction — contrast panel) -->
  <path d="M 42,248 C 42,215 58,192 88,185 C 125,177 182,176 235,176 C 290,178 328,190 345,210 C 353,222 354,238 350,250 L 42,250 Z"
        fill="#DEDBC8" fill-opacity="0.08" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.3"/>
  <!-- Contrast panel (design collab element, rear quarter) -->
  <path d="M 42,250 L 42,235 C 42,215 58,192 88,185 L 110,185 C 88,196 72,218 72,248 Z"
        fill="#DEDBC8" opacity="0.12"/>
  <!-- Second contrast panel -->
  <path d="M 285,178 C 310,183 330,196 345,210 L 345,250 L 315,250 C 315,232 306,212 285,203 Z"
        fill="#DEDBC8" opacity="0.1"/>

  <!-- Sole -->
  <rect x="36" y="250" width="320" height="12" rx="6" fill="#DEDBC8" opacity="0.18"/>
  <rect x="36" y="258" width="320" height="4" rx="2" fill="#000" opacity="0.35"/>

  <!-- Lace eyelets -->
  <g fill="#DEDBC8" opacity="0.42">
    <circle cx="148" cy="190" r="2"/>
    <circle cx="172" cy="185" r="2"/>
    <circle cx="196" cy="182" r="2"/>
    <circle cx="220" cy="181" r="2"/>
    <circle cx="244" cy="182" r="2"/>
    <circle cx="268" cy="184" r="2"/>
  </g>

  <!-- APEX badge -->
  <text x="30" y="40" font-family="sans-serif" font-weight="700" font-size="10" letter-spacing="5" fill="#DEDBC8" opacity="0.6">APEX</text>

  <!-- X (collab) mark -->
  <text x="97" y="52" font-family="sans-serif" font-size="14" fill="#DEDBC8" opacity="0.4">×</text>
  <text x="115" y="52" font-family="sans-serif" font-weight="700" font-size="10" letter-spacing="3" fill="#DEDBC8" opacity="0.4">STUDIO</text>

  <!-- Product name -->
  <text x="30" y="315" font-family="sans-serif" font-weight="800" font-size="22" letter-spacing="-0.5" fill="#DEDBC8" opacity="0.9">APEX × STUDIO</text>
  <text x="30" y="342" font-family="sans-serif" font-weight="300" font-size="18" letter-spacing="3" fill="#DEDBC8" opacity="0.6">LOW</text>

  <!-- Category -->
  <text x="30" y="366" font-family="sans-serif" font-size="8" letter-spacing="3" fill="#DEDBC8" opacity="0.25">COLLAB · LIMITED EDITION</text>

  <!-- Limited badge -->
  <rect x="30" y="372" width="90" height="16" rx="3" fill="#DEDBC8" opacity="0.08"/>
  <text x="36" y="384" font-family="sans-serif" font-size="7" letter-spacing="2" fill="#DEDBC8" opacity="0.5">LTD. RELEASE</text>

  <!-- Diamond accent -->
  <rect x="370" y="28" width="12" height="12" fill="none" stroke="#DEDBC8" stroke-width="0.6" opacity="0.25" transform="rotate(45 376 34)"/>
</svg>
