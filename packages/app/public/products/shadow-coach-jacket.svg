<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="shadow-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#shadow-bg)"/>

  <!-- Ghost S letterform -->
  <text x="80" y="330" font-family="sans-serif" font-weight="900" font-size="280" fill="#DEDBC8" opacity="0.03">S</text>

  <!-- Coach jacket (windbreaker, front view) -->
  <!-- Main body -->
  <path d="M 82,155 L 65,330 C 65,338 77,342 92,342 L 308,342 C 323,342 335,338 335,330 L 318,155 Z"
        fill="#DEDBC8" fill-opacity="0.08" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- Left sleeve (longer, narrower than hoodie) -->
  <path d="M 82,155 L 40,285 C 36,298 44,305 56,302 L 76,195 Z"
        fill="#DEDBC8" fill-opacity="0.08" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.22"/>
  <!-- Right sleeve -->
  <path d="M 318,155 L 360,285 C 364,298 356,305 344,302 L 324,195 Z"
        fill="#DEDBC8" fill-opacity="0.08" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.22"/>
  <!-- Collar (coach collar - stiff, small, fold) -->
  <path d="M 82,155 C 100,138 140,128 200,128 C 260,128 300,138 318,155 C 295,150 255,145 200,145 C 145,145 105,150 82,155 Z"
        fill="#DEDBC8" fill-opacity="0.1" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.28"/>

  <!-- Full front zipper -->
  <line x1="200" y1="148" x2="200" y2="335" stroke="#DEDBC8" stroke-width="1.5" stroke-opacity="0.2"/>
  <!-- Zipper pull -->
  <rect x="195" y="162" width="10" height="6" rx="2" fill="#DEDBC8" opacity="0.35"/>

  <!-- Chest pocket (left side, snap closure) -->
  <rect x="104" y="180" width="52" height="40" rx="3" fill="none" stroke="#DEDBC8" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="130" y1="180" x2="130" y2="220" stroke="#DEDBC8" stroke-width="0.4" opacity="0.12"/>
  <!-- Snap button -->
  <circle cx="130" cy="178" r="2.8" fill="none" stroke="#DEDBC8" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="130" cy="178" r="1" fill="#DEDBC8" opacity="0.3"/>

  <!-- Shoulder seams (raglan style) -->
  <line x1="82" y1="155" x2="105" y2="145" stroke="#DEDBC8" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="3,5"/>
  <line x1="318" y1="155" x2="295" y2="145" stroke="#DEDBC8" stroke-width="0.6" stroke-opacity="0.2" stroke-dasharray="3,5"/>

  <!-- Elastic hem band -->
  <rect x="64" y="328" width="272" height="14" rx="0" fill="#DEDBC8" fill-opacity="0.06"/>
  <line x1="65" y1="331" x2="335" y2="331" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="65" y1="335" x2="335" y2="335" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="65" y1="339" x2="335" y2="339" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>

  <!-- Cuff bands -->
  <rect x="39" y="292" width="18" height="12" rx="0" fill="#DEDBC8" fill-opacity="0.06"/>
  <line x1="39" y1="296" x2="57" y2="296" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="39" y1="300" x2="57" y2="300" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>
  <rect x="343" y="292" width="18" height="12" rx="0" fill="#DEDBC8" fill-opacity="0.06"/>
  <line x1="343" y1="296" x2="361" y2="296" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="343" y1="300" x2="361" y2="300" stroke="#DEDBC8" stroke-width="0.4" stroke-opacity="0.12"/>

  <!-- APEX badge -->
  <text x="30" y="40" font-family="sans-serif" font-weight="700" font-size="10" letter-spacing="5" fill="#DEDBC8" opacity="0.6">APEX</text>

  <!-- Product name -->
  <text x="30" y="355" font-family="sans-serif" font-weight="800" font-size="20" letter-spacing="-0.5" fill="#DEDBC8" opacity="0.9">SHADOW COACH</text>
  <text x="30" y="378" font-family="sans-serif" font-weight="300" font-size="16" letter-spacing="3" fill="#DEDBC8" opacity="0.6">JACKET</text>

  <!-- Category -->
  <text x="30" y="394" font-family="sans-serif" font-size="7" letter-spacing="3" fill="#DEDBC8" opacity="0.25">OUTERWEAR · NYLON</text>

  <!-- Corner mark -->
  <line x1="358" y1="358" x2="385" y2="358" stroke="#DEDBC8" stroke-width="0.8" opacity="0.2"/>
  <line x1="358" y1="358" x2="358" y2="385" stroke="#DEDBC8" stroke-width="0.8" opacity="0.2"/>
</svg>
